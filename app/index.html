<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Av/IntelOS — GlobalAir.com Intelligence Hub</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23102297'/><text x='16' y='22' text-anchor='middle' font-size='14' fill='%2397cb00' font-weight='700'>Av</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <a href="#content-area" class="skip-link">Skip to main content</a>

  <!-- ============================================================
       SIDEBAR
       ============================================================ -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="avos avos-sm" style="justify-content:center">
        <span class="avos-av">Av</span>
        <span class="avos-slash">/</span>
        <span class="avos-core">Intel</span>
        <span class="avos-os">OS</span>
      </div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Intelligence</div>
      <div class="nav-item active" data-route="dashboard" onclick="Router.navigate('dashboard')" tabindex="0" role="link">
        <span class="nav-icon">&#128202;</span>
        <span class="nav-label">Dashboard</span>
      </div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Analytics</div>
      <div class="nav-item" data-route="ga4" onclick="Router.navigate('ga4')" tabindex="0" role="link">
        <span class="nav-icon">&#128200;</span>
        <span class="nav-label">GA4 Analytics</span>
      </div>
      <div class="nav-item" data-route="organic" onclick="Router.navigate('organic')" tabindex="0" role="link">
        <span class="nav-icon">&#128269;</span>
        <span class="nav-label">Organic Intelligence</span>
      </div>
      <div class="nav-item" data-route="competitive" onclick="Router.navigate('competitive')" tabindex="0" role="link">
        <span class="nav-icon">&#128373;</span>
        <span class="nav-label">Competitive Intel</span>
      </div>
      <div class="nav-item" data-route="ppc" onclick="Router.navigate('ppc')" tabindex="0" role="link">
        <span class="nav-icon">&#128176;</span>
        <span class="nav-label">PPC & Paid</span>
      </div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Performance</div>
      <div class="nav-item" data-route="content" onclick="Router.navigate('content')" tabindex="0" role="link">
        <span class="nav-icon">&#128196;</span>
        <span class="nav-label">Content & Channel</span>
      </div>
      <div class="nav-item" data-route="health" onclick="Router.navigate('health')" tabindex="0" role="link">
        <span class="nav-icon">&#9889;</span>
        <span class="nav-label">Data Health</span>
      </div>
    </div>

    <div style="margin-top:auto; padding:16px 20px; font-size:10px; color:rgba(255,255,255,0.25);">
      GlobalAir.com &copy; 2026
    </div>
  </nav>

  <!-- ============================================================
       MAIN AREA
       ============================================================ -->
  <div id="main">

    <!-- Topbar -->
    <header id="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Toggle navigation">&#9776;</button>
        <div id="topbar-date-range"></div>
        <div id="topbar-signal-toggle"></div>
      </div>
      <div class="topbar-right">
        <div id="topbar-role-indicator"></div>
        <div id="topbar-role-switcher"></div>
        <div id="topbar-data-freshness"></div>
      </div>
    </header>

    <!-- Content Area -->
    <main id="content-area">
      <div class="page-loading">
        <div class="skeleton-block"></div>
        <div class="skeleton-block"></div>
        <div class="skeleton-block"></div>
      </div>
    </main>

  </div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- ============================================================
       SCRIPTS — Order matters: dependencies first, pages last
       ============================================================ -->
  <script src="js/store.js"></script>
  <script src="js/events.js"></script>
  <script src="js/confidence.js"></script>
  <script src="js/metrics-registry.js"></script>
  <script src="js/role-filter.js"></script>
  <script src="js/components.js"></script>
  <script src="js/windsor.js"></script>
  <script src="js/seed-data.js"></script>
  <script src="js/router.js"></script>

  <!-- Page Modules -->
  <script src="js/pages/intelligence-dashboard.js"></script>
  <script src="js/pages/ga4-analytics.js"></script>
  <script src="js/pages/organic-intelligence.js"></script>
  <script src="js/pages/competitive-intelligence.js"></script>
  <script src="js/pages/ppc-analytics.js"></script>
  <script src="js/pages/content-channel.js"></script>
  <script src="js/pages/data-health.js"></script>

  <script>
    // ---- Boot ----
    (async function boot() {
      SeedData.initialize();
      renderTopbar();
      Router.init();

      // Attempt to load live data from Windsor API (non-blocking)
      try {
        const result = await Windsor.refreshAll();
        if (result.succeeded > 0) {
          console.log('[Boot] Live data loaded — re-rendering...');
          renderTopbar();
          Router.rerender();
        }
      } catch (e) {
        console.warn('[Boot] Windsor refresh failed — using seed data:', e.message);
      }
    })();

    // Keyboard support: Enter on nav items
    document.querySelectorAll('.nav-item[data-route]').forEach(item => {
      item.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); item.click(); } });
    });

    function renderTopbar() {
      const settings = Store.get('intel_settings') || {};
      document.getElementById('topbar-date-range').innerHTML = Components.dateRangePickerExtended(settings.date_range || '30d');
      document.getElementById('topbar-signal-toggle').innerHTML = Components.signalCleanToggle();
      document.getElementById('topbar-role-indicator').innerHTML = RoleFilter.roleIndicator();
      document.getElementById('topbar-role-switcher').innerHTML = RoleFilter.roleSwitcher();
      // Data freshness — show connector status from health store
      const healthConnectors = Store.get('intel_health_connectors') || {};
      const connectedCount = Object.values(healthConnectors).filter(c => c.status === 'connected').length;
      const totalCount = Object.keys(healthConnectors).length;
      const dotColor = connectedCount === 0 ? 'windsor-dot-amber' : connectedCount >= 3 ? 'windsor-dot-green' : 'windsor-dot-amber';
      const freshLabel = connectedCount > 0 ? `${connectedCount}/${totalCount} live` : 'Seed data';
      document.getElementById('topbar-data-freshness').innerHTML =
        `<span class="windsor-dot ${dotColor}" title="Data: ${freshLabel}" style="cursor:pointer;" onclick="Router.navigate('health')">&#9679; ${freshLabel}</span>`;
    }
  </script>

</body>
</html>
