# Av/IntelOS — Azure App Service Deployment
# React frontend + ASP.NET Core 8 backend → Single Azure App Service
# Triggers on push to master branch or manual dispatch

name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: avintelos
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Frontend Build ──────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Backend Build ───────────────────────────────────────
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Copy frontend build to backend wwwroot
        run: |
          mkdir -p backend/wwwroot
          cp -r frontend/dist/* backend/wwwroot/

      - name: Publish backend
        working-directory: backend
        run: dotnet publish -c Release -o ./publish

      # ── Deploy ──────────────────────────────────────────────
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend/publish
