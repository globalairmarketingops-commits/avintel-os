# Av/IntelOS — Azure App Service Deployment
# React frontend + ASP.NET Core 8 backend → Single Azure App Service
# Triggers on push to main branch or manual dispatch

name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: avintelos
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Frontend Build ──────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Backend Build ───────────────────────────────────────
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Copy frontend build to backend wwwroot
        run: |
          mkdir -p backend/wwwroot
          cp -r frontend/dist/* backend/wwwroot/

      - name: Publish backend
        working-directory: backend
        run: dotnet publish -c Release -o ./publish

      # ── Deploy via Kudu ZipDeploy API ───────────────────────
      - name: Create deployment package
        run: |
          cd backend/publish
          zip -r ../../deploy.zip .

      - name: Deploy to Azure via Kudu
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          # Extract credentials from publish profile
          USERNAME=$(echo "$PUBLISH_PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASSWORD=$(echo "$PUBLISH_PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)

          echo "Deploying to ${{ env.AZURE_WEBAPP_NAME }}..."

          # Deploy via Kudu ZipDeploy REST API
          HTTP_CODE=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            -X POST \
            -u "${USERNAME}:${PASSWORD}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/zipdeploy?isAsync=false")

          echo "HTTP Response Code: $HTTP_CODE"
          cat /tmp/deploy_response.txt

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Deployment successful!"
          else
            echo "Deployment failed with HTTP $HTTP_CODE"
            exit 1
          fi
